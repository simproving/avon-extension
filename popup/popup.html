<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Avon</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>Avon</h1>
      <section class="formatter">
        <label for="inputArea">Input</label>
        <textarea id="inputArea" placeholder="Paste messy text with 5-digit product codes and optional quantities, e.g. 2x11155 99911 77333x3"></textarea>
        <div class="controls-row">
          <button id="btnProcess">Process</button>
          <button id="btnClear">Clear</button>
          <button id="btnCopy" title="Copy output to clipboard">Copy</button>
          <button id="btnFill" title="Fill the Avon Product Entry page using the output">Fill On Page</button>
        </div>
        <label for="outputArea">Output</label>
        <textarea id="outputArea" readonly placeholder="Formatted codes will appear here, e.g.&#10;11155 x 2&#10;99911&#10;77333 x 3"></textarea>
      </section>
      <button id="btnPing">Ping</button>
      <button id="btnHighlight">Highlight Selection</button>
      <button id="btnInject">Inject Alert</button>
      <button id="btnProductEntry">Open Product Entry</button>
      <p id="status" role="status"></p>
      <p>
        <a href="#" id="openOptions">Open Options</a>
      </p>
    </main>
    <script src="popup.js" type="module"></script>
  </body>
  </html>
