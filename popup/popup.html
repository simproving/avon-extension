<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n="popupTitle">Avon</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <div class="header-row">
        <h1 data-i18n="popupTitle">Avon</h1>
        <div class="language-selector">
          <select id="language" title="Select language">
            <option value="ro">RO</option>
            <option value="en">EN</option>
          </select>
        </div>
      </div>
      <section id="loginManager">
        <div class="login-row">
          <label for="loginName" data-i18n="loginNameLabel">Name</label>
          <input id="loginName" type="text" data-i18n-placeholder="loginNamePlaceholder" placeholder="" />
        </div>
        <div class="login-row">
          <label for="loginUsername" data-i18n="loginUsernameLabel">Username</label>
          <input id="loginUsername" type="text" autocomplete="username" />
        </div>
        <div class="login-row">
          <label for="loginPassword" data-i18n="loginPasswordLabel">Password</label>
          <div class="password-wrap">
            <input id="loginPassword" type="password" autocomplete="current-password" />
            <button id="btnTogglePassword" type="button" data-i18n-aria-label="loginToggleShow" data-i18n-title="loginToggleShow" aria-label="" title="">👁</button>
          </div>
        </div>
        <div class="login-controls">
          <button id="btnSaveLogin" data-i18n="btnSaveLogin">Save</button>
          <select id="loginSelect" data-i18n-title="loginSelectTitle" title=""></select>
          <button id="btnSendLogin" data-i18n="btnSendLogin">Send to Site</button>
        </div>
      </section>

      <button id="btnProductEntry" data-i18n="btnProductEntry">Open Product Entry</button>
      <section class="formatter">
        <label for="inputArea" data-i18n="labelInput">Input</label>
        <textarea id="inputArea" data-i18n-placeholder="inputPlaceholder" placeholder=""></textarea>
        <div class="controls-row">
          <button id="btnProcess" data-i18n="btnProcess">Process</button>
          <button id="btnClear" data-i18n="btnClear">Clear</button>
          <button id="btnCopy" data-i18n-title="btnCopyTitle" data-i18n="btnCopy">Copy</button>
          <button id="btnFill" data-i18n-title="btnFillTitle" data-i18n="btnFill">Fill On Page</button>
          <button id="btnContinue" data-i18n="btnContinue" title="" style="display:none">Continue</button>
          <button id="btnVerify" data-i18n="btnVerify" data-i18n-title="btnVerifyTitle" title="" style="display:none">Verify Codes</button>
          <button id="btnClearHighlights" data-i18n="btnClearHighlights" data-i18n-title="btnClearHighlightsTitle" title="" style="display:none">Clear Highlights</button>
        </div>
        
        <div class="status-section">
          <hr class="status-separator">
          <p id="counts"></p>
          <p id="status" role="status"></p>
        </div>
        
        <label data-i18n="labelOutput">Output</label>
        <div id="outputTableWrapper">
          <table id="outputTable" data-i18n-aria-label="tableAria" aria-label="">
            <thead>
              <tr><th data-i18n="thIndex">#</th><th data-i18n="thCode">Code</th><th data-i18n="thQty">Qty</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
      <button id="btnLoadExample" data-i18n-title="btnLoadExampleTitle" data-i18n="btnLoadExample">Load Example</button>

      <section id="logsContainer">
        <details id="logsSection">
          <summary>Fill History (click entries to view details)</summary>
          <div id="logsWrapper">
            <table id="logsTable">
              <thead>
                <tr><th>Date</th><th>Name</th><th>Username</th><th>Total</th></tr>
              </thead>
              <tbody id="logsTbody"></tbody>
            </table>
          </div>
        </details>
      </section>
    </main>
    <script src="../i18n.js"></script>
    <script src="popup.js" type="module"></script>
  </body>
  </html>
