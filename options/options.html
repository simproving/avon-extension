<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n="optionsTitle">Avon Options</title>
    <style>
      :root { color-scheme: light dark; }
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica Neue, Arial; margin: 16px; }
      label { display: block; margin-bottom: 8px; }
      input[type="text"] { width: 320px; }
    </style>
  </head>
  <body>
    <h1 data-i18n="headingOptions">Options</h1>
    <label>
      <span data-i18n="languageLabel">Language:</span>
      <select id="language">
        <option value="ro" data-i18n="language_ro">Romanian</option>
        <option value="en" data-i18n="language_en">English</option>
      </select>
    </label>
    <hr />
    <h2 data-i18n="aliasesHeading">Aliases</h2>
    <p data-i18n="aliasesHelp">Map words/phrases to 5-digit codes. During parsing, "10 pungi" adds that code with quantity 10.</p>
    <table id="aliasesTable" aria-label="Aliases" style="border-collapse: collapse; margin-bottom: 8px;">
      <thead>
        <tr>
          <th style="text-align:left; padding-right: 8px;" data-i18n="aliasPhrase">Phrase</th>
          <th style="text-align:left; padding-right: 8px;" data-i18n="aliasCode">Code</th>
          <th style="text-align:left;" data-i18n="aliasActions">Actions</th>
        </tr>
      </thead>
      <tbody id="aliasesTbody"></tbody>
    </table>
    <button id="addAlias" data-i18n="addAlias">Add alias</button>
    <button id="save" data-i18n="save">Save</button>
    <p id="status" role="status"></p>
    <script src="../i18n.js"></script>
    <script src="options.js" type="module"></script>
  </body>
  </html>
