<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n="optionsTitle">Avon Options</title>
    <style>
      :root { color-scheme: light dark; }
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica Neue, Arial; margin: 16px; }
      label { display: block; margin-bottom: 8px; }
      input[type="text"] { width: 320px; }
    </style>
  </head>
  <body>
    <h1 data-i18n="headingOptions">Options</h1>
    <label>
      <span data-i18n="languageLabel">Language:</span>
      <select id="language">
        <option value="ro" data-i18n="language_ro">Romanian</option>
        <option value="en" data-i18n="language_en">English</option>
      </select>
    </label>

    <button id="save" data-i18n="save">Save</button>
    <p id="status" role="status"></p>
    <script src="../i18n.js"></script>
    <script src="options.js" type="module"></script>
  </body>
  </html>
